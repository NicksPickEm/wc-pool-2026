<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<style>html { color-scheme: light only; }</style>
<title>WC Pool 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #b9bdc0;
  --surface:    #c4c8cb;
  --surface2:   #cbcfd1;
  --border:     #a3a8ac;
  --accent:     #262b30;
  --accent2:    #565d62;
  --text:       #262b30;
  --muted:      #6f7579;
  --green:      #2f5c36;
  --green-bg:   #cbcab0;
  --red:        #8a2e2e;
  --red-bg:     #d8c0c0;
  --neutral:    #565d62;
  --neutral-bg: #c4c8cb;
  --amber:      #8a6a1a;
  --amber-bg:   #d8c98a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: var(--bg) !important; color: var(--text) !important; min-height: 100vh; }
html { background: var(--bg) !important; }
.view { background: var(--bg) !important; }

.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 0; position: sticky; top: 0; z-index: 50; }
.header-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
.header-top h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 0.03em; }
.header-top span { font-size: 11px; color: var(--muted); }
.tabs { display: flex; gap: 2px; overflow-x: auto; }
.tab { padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 6px 6px 0 0; color: var(--muted); border: none; background: none; white-space: nowrap; font-family: 'Barlow', sans-serif; transition: color 0.15s; }
.tab.active { color: var(--bg); background: var(--accent); font-weight: 600; }
.tab:hover:not(.active) { color: var(--text); }

.view { display: none; padding: 16px; }
.view.active { display: block; }
.sec-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

.fdot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; flex-shrink: 0; vertical-align: middle; }

/* ── LEADERBOARD ── */
.lb-header-row { display: grid; grid-template-columns: 26px 1fr 40px 40px 40px 48px 40px 48px; gap: 3px; padding: 0 8px; font-size: 9px; font-weight: 600; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.lh-sortable { cursor: pointer; user-select: none; transition: color 0.15s; text-align: center; }
.lh-sortable:hover { color: var(--text); }
.lh-sortable.lh-active { color: var(--accent); font-weight: 700; }
.lh-name.lh-sortable { text-align: left; }
.lb-header-row div { text-align: center; }
.lb-header-row .lh-name { text-align: left; }
.lb-card { display: grid; grid-template-columns: 26px 1fr 40px 40px 40px 48px 40px 48px; gap: 3px; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 8px; cursor: pointer; transition: border-color 0.15s; margin-bottom: 4px; }
.lb-card:hover { border-color: var(--accent2); }
.lb-card.leader { border-color: var(--accent); }
.lb-rank { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; text-align: center; color: var(--muted); }
.lb-rank.r1 { color: var(--accent); }
.lb-rank.r2 { color: #b0b8c8; }
.lb-rank.r3 { color: #9a8060; }
.lb-name { font-weight: 500; font-size: 13px; color: var(--text); }
.lb-bar-wrap { height: 2px; background: var(--border); border-radius: 1px; margin-top: 3px; }
.lb-bar { height: 2px; background: var(--accent); border-radius: 1px; opacity: 0.5; }
.lb-max { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; color: var(--green); }
.lb-pts { text-align: center; font-size: 12px; color: var(--muted); }
.lb-total { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700; color: var(--accent); }

/* ── GROUPS ── */
.group-list { display: flex; flex-direction: column; gap: 6px; }
.group-btn { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; cursor: pointer; width: 100%; text-align: left; transition: border-color 0.15s; gap: 12px; }
.group-btn:hover { border-color: var(--accent2); }
.group-letter { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; color: var(--accent); flex-shrink: 0; width: 20px; }
.group-teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; flex: 1; }
.group-team-name { font-size: 13px; color: var(--text); display: flex; align-items: center; }
.group-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.group-status { font-size: 11px; color: var(--green); }
.group-status.pending { color: var(--muted); }

/* ── SHEET ── */
.sheet-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: flex-end; }
.sheet-bg.open { display: flex; }
.sheet { background: var(--surface); border-radius: 18px 18px 0 0; width: 100%; max-height: 92vh; overflow-y: auto; border-top: 1px solid var(--border); }
.sheet-sticky { padding: 10px 16px 12px; position: sticky; top: 0; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1; }
.sheet-handle { width: 32px; height: 3px; background: var(--border); border-radius: 2px; margin: 0 auto 10px; }
.sheet-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); }
.sheet-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.sheet-body { padding: 14px 16px 40px; }

.standings-tbl { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 16px; }
.standings-tbl th { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 5px 6px; border-bottom: 1px solid var(--border); text-align: center; }
.standings-tbl th.team-th { text-align: left; }
.standings-tbl td { padding: 7px 6px; border-bottom: 1px solid var(--border); text-align: center; font-size: 12px; }
.standings-tbl tr:last-child td { border-bottom: none; }
.standings-tbl td.team-td { text-align: left; font-weight: 500; color: var(--text); }
.standings-tbl td.qualify { border-left: 2px solid var(--green); }

.match-block { margin-bottom: 8px; }
.match-num { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.match-info { font-size: 11px; color: var(--muted); margin-top: 3px; }
.ko-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 6px; }
.ko-team { font-size: 13px; font-weight: 600; }
.ko-team.home { text-align: left; }
.ko-team.away { text-align: right; }
.ko-center { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.ko-vs { font-size: 10px; font-weight: 700; color: var(--muted); }
.ko-meta { font-size: 9px; color: var(--muted); text-align: center; white-space: nowrap; }
.ko-badge { display: inline-block; background: var(--accent); color: #e8e2d8; font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 3px; margin-left: 3px; }

/* ── BRACKET ── */
.br-round-tabs { display: flex; gap: 4px; overflow-x: auto; padding: 12px 12px 0; margin-bottom: 10px; }
.br-round-tab { padding: 6px 11px; font-size: 11px; font-weight: 600; border-radius: 6px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); white-space: nowrap; cursor: pointer; flex-shrink: 0; font-family: 'Barlow', sans-serif; }
.br-round-tab.active { background: var(--accent); color: #e8e2d8; border-color: var(--accent); }
.br-dots { display: flex; justify-content: center; gap: 6px; padding: 6px 0 10px; }
.br-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: background 0.2s; }
.br-dot.active { background: var(--accent); }
.br-swipe-wrapper { display: flex; transition: transform 0.3s ease; overflow: hidden; width: 500%; }
.br-page { width: 20%; padding: 0 12px 20px; flex-shrink: 0; box-sizing: border-box; }
.br-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 0; margin-bottom: 14px; display: flex; }
.br-nuggets { margin-bottom: 14px; }
.br-nugget { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; font-size: 11px; line-height: 1.4; color: var(--text); }
.br-nugget:last-child { margin-bottom: 0; }
.br-nugget b { color: var(--accent); }
.br-summary-stat { flex: 1; text-align: center; border-right: 1px solid var(--border); }
.br-summary-stat:last-child { border-right: none; }
.br-summary-val { font-size: 18px; font-weight: 700; color: var(--accent); }
.br-summary-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
.br-pair { display: grid; grid-template-columns: 1fr 32px; margin-bottom: 20px; }
.br-pair-cards { display: flex; flex-direction: column; }
.br-match-meta { font-size: 9px; color: var(--muted); margin-bottom: 2px; display: flex; gap: 5px; align-items: center; }
.br-venue { font-size: 8px; color: var(--muted); margin-bottom: 3px; }
.br-match-gap { height: 20px; }
.br-match-block { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; }
.br-team-card { height: 40px; padding: 0 10px; display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-bottom: 1px solid var(--border); }
.br-team-card:last-child { border-bottom: none; }
.br-team-card.br-winner { background: var(--green-bg); }
.br-team-card.br-loser { opacity: 0.45; }
.br-team-card.br-tbd { background: var(--surface2); }
.br-team-name { font-size: 12px; font-weight: 500; }
.br-team-name.br-tbd { font-size: 11px; color: var(--muted); font-style: italic; }
.br-team-pts { font-size: 12px; font-weight: 700; color: var(--amber); }
.br-team-pts.br-earned { color: var(--green); }
.pen-tag { font-size: 8px; font-weight: 700; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 4px; margin-right: 4px; }
.br-team-pts.br-lost { color: var(--red); }
.br-expand-icon { font-size: 10px; color: var(--muted); margin-left: 4px; }
.br-picks-panel { display: none; background: var(--surface2); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; padding: 10px; }
.br-picks-panel.open { display: block; }
.br-picks-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.br-picks-col-team { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 5px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.br-picks-col-team.br-winning { color: var(--green); }
.br-picks-col-team.br-losing { color: var(--red); opacity: 0.7; }
.br-pick-name { font-size: 10px; color: var(--text); padding: 2px 0; }
.br-pick-name.br-correct { color: var(--green); font-weight: 600; }
.br-pick-name.br-wrong { color: var(--red); opacity: 0.8; }
.match-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
.match-date-label { font-size: 10px; color: var(--muted); }
.match-time { font-size: 10px; color: var(--accent2); font-weight: 600; }
.broadcast-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.04em; }
.broadcast-badge.fox { background: #1a3050; color: #6ab0f0; }
.broadcast-badge.fs1 { background: #2a1a10; color: #e08040; }
.match-row { display: flex; align-items: center; padding: 9px 10px; background: var(--surface2); border-radius: 6px; }
.match-home { flex: 1; text-align: right; font-size: 13px; color: var(--text); }
.match-away { flex: 1; text-align: left; font-size: 13px; color: var(--text); }
.match-score { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); min-width: 44px; text-align: center; }
.match-score.pending { color: var(--muted); font-size: 12px; font-family: 'Barlow', sans-serif; font-weight: 400; }

.picks-tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.picks-tbl th { padding: 6px 5px; font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); text-align: center; }
.picks-tbl th.player-th { text-align: left; }
.picks-tbl td { padding: 7px 5px; border-bottom: 1px solid var(--border); text-align: center; vertical-align: middle; }
.picks-tbl tr:last-child td { border-bottom: none; }
.picks-tbl tr:hover td { background: var(--surface2); }
.picks-tbl td.player-td { text-align: left; font-weight: 500; color: var(--text); white-space: nowrap; }

.badge { width: 26px; height: 26px; border-radius: 50%; font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
.badge.correct { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
.badge.wrong   { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red); }
.badge.partial { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber); }
.badge.pending { background: var(--neutral-bg); color: var(--neutral); border: 1px solid var(--neutral); }

.legend { display: flex; gap: 14px; margin-top: 12px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
.legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

/* ── SCHEDULE ── */
.sub-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
.sub-tab { padding: 6px 16px; font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 20px; color: var(--muted); border: 1px solid var(--border); background: none; font-family: 'Barlow', sans-serif; transition: all 0.15s; }
.sub-tab.active { background: var(--surface2); color: var(--accent); border-color: var(--accent2); }
.schedule-section { margin-bottom: 20px; }
.schedule-group-label { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.date-label { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* ── PLAYER ── */
.player-select-row { display: flex; gap: 8px; margin-bottom: 16px; }
.select-wrap { flex: 1; }
.select-wrap label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; color: var(--text); padding: 9px 12px; font-size: 13px; font-family: 'Barlow', sans-serif; appearance: none; }
.score-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; }
.score-card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.score-card-val { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; color: var(--accent); }
.player-groups { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.player-group-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; }
.player-group-split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.player-group-col-label { font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }

.point-breakdown { margin-top: 4px; }
.bd-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; border-radius: 5px; font-size: 11px; margin-bottom: 3px; }
.bd-row.bd-hit  { background: var(--green-bg); color: var(--green); }
.bd-row.bd-miss { background: var(--red-bg); color: var(--red); opacity: 0.75; }
.bd-row.bd-open { background: var(--amber-bg); color: var(--amber); }
.bd-label { flex: 1; }
.bd-pts { font-weight: 700; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; margin-left: 8px; }
.bd-icon { font-family: Arial, sans-serif; font-weight: 900; margin-left: 2px; }
.bd-icon-hit { color: #1a4d20; }
.bd-icon-miss { color: #6b1414; }
.mini-standings { width: 100%; border-collapse: collapse; font-size: 10px; }
.mini-standings th { font-size: 8px; font-weight: 600; color: var(--muted); padding: 2px 3px; text-align: center; border-bottom: 1px solid var(--border); }
.mini-standings td { padding: 3px 3px; text-align: center; border-bottom: 1px solid var(--border); font-size: 10px; color: var(--text); }
.mini-standings tr:last-child td { border-bottom: none; }
.mini-team { text-align: left !important; font-size: 10px; white-space: nowrap; }
.player-group-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.player-group-letter { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--accent); }
.player-group-pts { font-size: 12px; color: var(--muted); }
.player-group-pts.scored { color: var(--text); font-weight: 600; }
.player-picks-list { display: flex; flex-direction: column; gap: 5px; }
.player-pick { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); }
.player-pick .badge { width: 22px; height: 22px; font-size: 10px; flex-shrink: 0; }
.analytic-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 13px; margin-bottom: 8px; }
.analytic-title { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.analytic-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.analytic-row:last-child { border-bottom: none; }
.analytic-val { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; }
.analytic-val.good { color: var(--green); }
.analytic-val.bad  { color: var(--red); }
.analytic-val.neutral { color: var(--accent); }
.compare-group { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; margin-bottom: 6px; }
.compare-group-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.compare-group-letter { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--accent); }
.compare-pts { display: flex; gap: 12px; font-size: 12px; }
.compare-team-row { display: flex; align-items: center; gap: 6px; padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
.compare-team-row:last-child { border-bottom: none; }
.compare-team-name { flex: 1; color: var(--text); }
.compare-badges { display: flex; gap: 8px; }
.compare-badge-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.compare-badge-label { font-size: 9px; color: var(--muted); }

/* ── RULES ── */
.rules-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
.rules-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
.rules-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.rules-row:last-child { border-bottom: none; }
.rules-row-label { color: var(--text); }
.rules-row-val { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap; margin-left: 12px; }
.rules-note { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top"><h1>⚽ WC Pool 2026</h1><span>Updated June 30, 11:20 AM ET</span></div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('lb',this)">Leaderboard</button>
    <button class="tab" onclick="showTab('gv',this)">Groups</button>
    <button class="tab" onclick="showTab('sc',this)">Schedule</button>
    <button class="tab" onclick="showTab('br',this)">Bracket</button>
    <button class="tab" onclick="showTab('pv',this)">Players</button>
    <button class="tab" onclick="showTab('rl',this)">Rules</button>
  </div>
</div>
<div id="lb" class="view active"></div>
<div id="gv" class="view"></div>
<div id="sc" class="view"></div>
<div id="br" class="view" style="padding:0"></div>
<div id="pv" class="view"></div>
<div id="rl" class="view"></div>
<div class="sheet-bg" id="sheet-bg" onclick="maybeCloseSheet(event)">
  <div class="sheet">
    <div class="sheet-sticky">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sheet-title"></div>
      <div class="sheet-sub" id="sheet-sub"></div>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>
</div>

// Teams confirmed as advancing 3rd place finishers (update as tournament progresses)
const ADVANCING_3RD = ['DR Congo','Sweden','Ghana','Ecuador','Bosnia & Herz.','Algeria','Paraguay','Senegal'];

function calcGroupPts(picks,result,group){
  if(!picks || !result) return 0;
  let pts=0;
  // Find confirmed 1st place (a1) and 2nd place (a2) — null means not yet confirmed
  const a1=result.indexOf(1); // -1 if 1st place not confirmed
  const a2=result.indexOf(2); // -1 if 2nd place not confirmed
  const p1=picks.indexOf(1),p2=picks.indexOf(2);
  if(a1!==-1){ if(p1===a1)pts+=10; else if(a2!==-1&&p1===a2)pts+=5; }
  if(a2!==-1){
    if(p2===a2)pts+=5;
    else if(p2===a1)pts+=5;
    else{
      const finishPos=result[p2];
      if(finishPos===3){
        const team=countryName(GROUPS[group].teams[p2]);
        if(ADVANCING_3RD.includes(team))pts+=2;
      }
    }
  } else if(a1!==-1 && p2===a1){
    pts+=5; // 2nd place pick happens to match confirmed 1st (rare but handle it)
  }
  return pts;
}
function calcBonusPts(picks,result){if(!result)return 0;if(result.includes(null))return 0;return picks.every((v,i)=>v===result[i])?5:0;}
function calcThirdPts(p){if(!p.thirds||!ADVANCING_3RD.length)return 0;return p.thirds.reduce((s,t)=>s+(ADVANCING_3RD.includes(t)?3:0),0);}
function playerGroupPts(p){return Object.keys(GROUPS).reduce((s,g)=>s+calcGroupPts(p.picks[g],GROUPS[g].result,g),0);}
function playerBonusPts(p){return Object.keys(GROUPS).reduce((s,g)=>s+calcBonusPts(p.picks[g],GROUPS[g].result),0);}
// KO scoring
const KO_RESULTS = {73:'away', 74:'away', 75:'away', 76:'home'};
const KO_PTS_BY_ROUND = {73:10,74:10,75:10,76:10,77:10,78:10,79:10,80:10,81:10,82:10,83:10,84:10,85:10,86:10,87:10,88:10,89:20,90:20,91:20,92:20,93:20,94:20,95:20,96:20,97:50,98:50,99:50,100:50,101:100,102:100,103:50,104:250};

// Returns true if a team code has been eliminated in any played R32/R16/QF/SF match
function isTeamEliminated(code){
  if(!code) return false;
  const allMatches=[];
  [...BR_PAIRS,...R16_PAIRS].forEach(pair=>pair.matches.forEach(m=>allMatches.push(m)));
  for(const m of allMatches){
    if(!m.result) continue;
    const homeCode=m.homeConfirmed||Object.keys(KO_TEAMS).find(k=>KO_TEAMS[k]===m.home);
    const awayCode=m.awayConfirmed||Object.keys(KO_TEAMS).find(k=>KO_TEAMS[k]===m.away);
    if(homeCode===code && m.result==='away') return true;
    if(awayCode===code && m.result==='home') return true;
  }
  return false;
}

function calcKOPts(p){
  if(!KO_PICKS||!KO_PICKS[p.name]) return 0;
  const picks=KO_PICKS[p.name];
  let pts=0;
  Object.keys(KO_RESULTS).forEach(mNum=>{
    const num=parseInt(mNum);
    const result=KO_RESULTS[num];
    const pick=picks[num];
    if(!pick||!result) return;
    const allPairs=[...BR_PAIRS,...R16_PAIRS];
    let match=null;
    allPairs.forEach(pair=>pair.matches.forEach(m=>{if(m.num===num)match=m;}));
    if(!match) return;
    const homeCode=match.homeConfirmed||Object.keys(KO_TEAMS).find(k=>KO_TEAMS[k]===match.home);
    const awayCode=match.awayConfirmed||Object.keys(KO_TEAMS).find(k=>KO_TEAMS[k]===match.away);
    const pickSide=pick===homeCode?'home':pick===awayCode?'away':null;
    if(pickSide===result) pts+=(KO_PTS_BY_ROUND[num]||0);
  });
  return pts;
}

function totalPts(p){return playerGroupPts(p)+playerBonusPts(p)+calcThirdPts(p)+calcKOPts(p);}

function calcKOMaxPts(p){
  if(!KO_PICKS||!KO_PICKS[p.name]) return KNOCKOUT_MAX;
  const picks=KO_PICKS[p.name];
  const allMatches=[];
  [...BR_PAIRS,...R16_PAIRS].forEach(pair=>pair.matches.forEach(m=>allMatches.push(m)));
  let max=0;
  Object.keys(picks).map(Number).forEach(mNum=>{
    const code=picks[mNum];
    const match=allMatches.find(m=>m.num===mNum);
    const pts=KO_PTS_BY_ROUND[mNum]||0;
    if(isTeamEliminated(code)){ return; } // picked team already lost — dead, contributes 0
    if(!match || !match.result){ max+=pts; return; } // not yet played, still possible
    const homeCode=match.homeConfirmed||Object.keys(KO_TEAMS).find(k=>KO_TEAMS[k]===match.home);
    const awayCode=match.awayConfirmed||Object.keys(KO_TEAMS).find(k=>KO_TEAMS[k]===match.away);
    const pickSide=code===homeCode?'home':code===awayCode?'away':null;
    if(pickSide===match.result) max+=pts; // correct, locked in
    // else: pick lost, contributes 0 to max
  });
  return max;
}

// ─── MAX POSSIBLE FINAL SCORE ───────────────────────────────────────────────
const KNOCKOUT_MAX = 16*10 + 8*20 + 4*50 + 2*100 + 1*250; // 970

function maxGroupPts(picks,result,group){
  if(!picks || !group || !GROUPS[group]) return 0;
  const p1=picks.indexOf(1),p2=picks.indexOf(2);

  let r = result || [null,null,null,null];
  const a1 = r.indexOf(1); // -1 if not locked
  const a2 = r.indexOf(2);

  let max1=0, max2=0;

  // Best case for 1st place pick
  if(a1!==-1){
    // 1st place locked — only scores if pick matches it
    max1 = (p1===a1) ? 10 : 0;
    // could it still hit 5 via landing on 2nd? only if 2nd not locked or matches
    if(p1!==a1){
      if(a2!==-1){ max1 = (p1===a2)?5:0; }
      else { max1 = 5; } // 2nd still open, could land there
    }
  } else {
    max1 = 10; // 1st place still open — best case nails it
  }

  // Best case for 2nd place pick
  if(a2!==-1){
    if(p2===a2){ max2=5; }
    else if(a1!==-1 && p2===a1){ max2=5; }
    else if(a1===-1){ max2=5; } // 1st not locked, could still match it
    else {
      // check 3rd-and-advance potential
      const finishPos=r[p2];
      if(finishPos===3 || finishPos===null){
        max2 = 2; // could still be the advancing 3rd (best case)
      } else {
        max2 = 0;
      }
    }
  } else {
    max2 = 5; // 2nd place open — best case nails it directly
  }

  return max1+max2;
}

function maxBonusPts(picks,result){
  if(!result) return 5; // fully open group, bonus still achievable
  // Check if any locked position already contradicts the player's picks
  for(let i=0;i<4;i++){
    if(result[i]!==null && result[i]!==picks[i]) return 0; // contradiction, bonus impossible
  }
  return 5; // no contradictions yet, bonus still possible
}

function maxThirdPts(p){
  if(!p.thirds) return 0;
  // best case: only count picks that are still 'open' or already 'hit' — exclude confirmed misses
  return p.thirds.reduce((sum,teamName)=>{
    const state = thirdPickState(teamName);
    return sum + (state==='miss' ? 0 : 3);
  }, 0);
}

function findTeamGroup(teamName){
  for(const g of Object.keys(GROUPS)){
    if(GROUPS[g].teams.some(t=>countryName(t)===teamName)) return g;
  }
  return null;
}

function thirdPickState(teamName){
  // Returns 'hit' | 'miss' | 'open' for a single 3rd-place advancing pick
  if(ADVANCING_3RD.includes(teamName)) return 'hit';
  const g=findTeamGroup(teamName);
  if(!g) return 'open';
  const grp=GROUPS[g];
  const teamIdx=grp.teams.findIndex(t=>countryName(t)===teamName);
  if(teamIdx===-1) return 'open';
  const confirmedPos = grp.result ? grp.result[teamIdx] : null;
  if(confirmedPos!==null && confirmedPos!==undefined && confirmedPos!==3) return 'miss'; // locked into a position that isn't 3rd
  if(ADVANCING_3RD.length>0 && confirmedPos===3 && !ADVANCING_3RD.includes(teamName)) return 'miss'; // finished 3rd but didn't make the top 8
  return 'open';
}

function maxPossibleScore(p){
  let groupMax=0, bonusMax=0;
  Object.keys(GROUPS).forEach(g=>{
    groupMax += maxGroupPts(p.picks[g], GROUPS[g].result, g);
    bonusMax += maxBonusPts(p.picks[g], GROUPS[g].result);
  });
  const thirdMax = maxThirdPts(p);
  return groupMax + bonusMax + thirdMax + calcKOMaxPts(p);
}
function sortedPlayers(){return [...PLAYERS].sort((a,b)=>totalPts(b)-totalPts(a));}
function badgeClass(pick,actual,teamName){
  if(actual===null||actual===undefined)return 'pending';
  if(pick===actual)return 'correct';
  // Yellow cases: pick=1 and actual finished 2nd (5pts); pick=2 and actual finished 1st (5pts); pick=2 and actual finished 3rd-and-advanced (2pts)
  if(pick===1 && actual===2) return 'partial';
  if(pick===2 && actual===1) return 'partial';
  if(pick===2 && actual===3 && teamName && ADVANCING_3RD.includes(teamName)) return 'partial';
  return 'wrong';
}

// LEADERBOARD
let lbSortKey = 'total';
let lbSortDir = 'desc';

function lbSortValue(p, key) {
  switch(key) {
    case 'name': return p.name.toLowerCase();
    case 'group': return playerGroupPts(p);
    case 'bonus': return playerBonusPts(p);
    case 'third': return calcThirdPts(p);
    case 'ko':    return calcKOPts(p);
    case 'total': return totalPts(p);
    case 'max': return maxPossibleScore(p);
    default: return 0;
  }
}

function setLbSort(key) {
  if (lbSortKey === key) {
    lbSortDir = lbSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    lbSortKey = key;
    lbSortDir = key === 'name' ? 'asc' : 'desc';
  }
  renderLeaderboard();
}

function renderLeaderboard(){
  const ranked = [...PLAYERS].sort((a,b) => totalPts(b) - totalPts(a)); // rank badge always reflects true standing
  const rankMap = new Map(ranked.map((p,i) => [p.name, i+1]));

  const sorted = [...PLAYERS].sort((a,b) => {
    const av = lbSortValue(a, lbSortKey), bv = lbSortValue(b, lbSortKey);
    let cmp;
    if (typeof av === 'string') cmp = av.localeCompare(bv);
    else cmp = av - bv;
    return lbSortDir === 'asc' ? cmp : -cmp;
  });

  const max = totalPts(ranked[0]) || 1;

  const cols = [
    { key:'name',  label:'Player' },
    { key:'group',  label:'Group' },
    { key:'bonus',  label:'Bonus' },
    { key:'third',  label:'3rd pl.' },
    { key:'total',  label:'Total' },
    { key:'ko',     label:'KO' },
    { key:'max',    label:'Max' },
  ];
  const arrow = (key) => lbSortKey===key ? (lbSortDir==='asc' ? ' ▲' : ' ▼') : '';

  let html=`<div class="lb-header-row"><div></div>`;
  cols.forEach(c=>{
    const cls = c.key==='name' ? 'lh-name' : '';
    html += `<div class="${cls} lh-sortable${lbSortKey===c.key?' lh-active':''}" onclick="setLbSort('${c.key}')">${c.label}${arrow(c.key)}</div>`;
  });
  html += `</div>`;

  sorted.forEach((p)=>{
    const rank=rankMap.get(p.name), rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
    const gp=playerGroupPts(p),bp=playerBonusPts(p),tot=totalPts(p),bar=Math.round(tot/max*100);
    const mx=maxPossibleScore(p);
    html+=`<div class="lb-card${rank===1?' leader':''}" onclick="goPlayer('${p.name}')">
      <div class="lb-rank ${rc}">${rank}</div>
      <div><div class="lb-name">${p.name}</div><div class="lb-bar-wrap"><div class="lb-bar" style="width:${bar}%"></div></div></div>
      <div class="lb-pts">${gp}</div><div class="lb-pts">${bp>0?'+'+bp:'—'}</div><div class="lb-pts">${calcThirdPts(p)>0?calcThirdPts(p):'—'}</div>
      <div class="lb-total">${tot}</div>
      <div class="lb-pts">${calcKOPts(p)>0?calcKOPts(p):'—'}</div>
      <div class="lb-max">${mx}</div>
      <div class="lb-max">${mx}</div>
    </div>`;
  });
  document.getElementById('lb').innerHTML=html;
}

function openSheet(g){

  <table class="standings-tbl"><thead><tr><th class="team-th">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
  grp.table.forEach((row,i)=>{
    html+=`<tr><td class="team-td${i<2?' qualify':''}">${teamName(row.team)}</td><td>${row.p}</td><td>${row.w}</td><td>${row.d}</td><td>${row.l}</td><td>${row.gd>0?'+'+row.gd:row.gd}</td><td style="font-weight:600;color:var(--accent)">${row.pts}</td></tr>`;
  });
  html+=`</tbody></table>`;

  const played=grp.matches.filter(m=>m.score),upcoming=grp.matches.filter(m=>!m.score);
  if(played.length){html+=`<div class="sec-label" style="margin:14px 0 8px">Results</div>`;played.forEach(m=>{html+=matchBlock(m);});}
  if(upcoming.length){html+=`<div class="sec-label" style="margin:14px 0 8px">Upcoming</div>`;upcoming.forEach(m=>{html+=matchBlock(m);});}

  const hasAnyResult=!!grp.result;
  html+=`<div class="sec-label" style="margin:14px 0 8px">Everyone's picks</div>
  <table class="picks-tbl"><thead><tr><th class="player-th">Player</th>`;
  grp.teams.forEach(t=>{html+=`<th>${countryName(t)}</th>`;});
  if(hasAnyResult)html+=`<th>Pts</th>`;
  html+=`</tr></thead><tbody>`;
  sortedPlayers().forEach(p=>{
    const pts=hasAnyResult?calcGroupPts(p.picks[g],grp.result,g)+calcBonusPts(p.picks[g],grp.result):null;
    html+=`<tr style="cursor:pointer" onclick="closeSheet();setTimeout(()=>goPlayer('${p.name}'),50)"><td class="player-td">${p.name}</td>`;
    p.picks[g].forEach((pick,i)=>{
      const actual=hasAnyResult?grp.result[i]:null;
      const tname=countryName(grp.teams[i]);
      html+=`<td><div class="badge ${badgeClass(pick,actual,tname)}">${pick}</div></td>`;
    });
    if(hasAnyResult)html+=`<td style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--accent)">${pts}</td>`;
    html+=`</tr>`;
  });
  html+=`</tbody></table>
  <div class="legend">
    <span><span class="legend-dot" style="background:var(--green)"></span>Correct</span>
    <span><span class="legend-dot" style="background:var(--amber)"></span>Wrong, still points</span>
    <span><span class="legend-dot" style="background:var(--red)"></span>Wrong</span>
    ${!done?'<span><span class="legend-dot" style="background:var(--neutral-bg);border:1px solid var(--border)"></span>Pending</span>':''}
  </div>`;
  document.getElementById('sheet-body').innerHTML=html;
  document.getElementById('sheet-bg').classList.add('open');
}

function setScheduleMode(mode,el){
  scheduleMode=mode;
  document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderScheduleContent();
}
function renderScheduleContent(){
  let html='';
  if(scheduleMode==='group'){
    Object.keys(GROUPS).forEach(g=>{
      html+=`<div class="schedule-section"><div class="schedule-group-label">Group ${g}</div>`;
      GROUPS[g].matches.forEach(m=>{html+=matchBlock(m);});
      html+=`</div>`;
    });
  } else if(scheduleMode==='date'){
    const TIME_SORT={'12:00 AM ET':0,'1:00 AM ET':1,'12:00 PM ET':12,'1:00 PM ET':13,'3:00 PM ET':15,'4:00 PM ET':16,'5:00 PM ET':17,'6:00 PM ET':18,'7:00 PM ET':19,'8:00 PM ET':20,'8:30 PM ET':20.5,'9:00 PM ET':21,'10:00 PM ET':22,'11:00 PM ET':23};
    const all=[];
    Object.keys(GROUPS).forEach(g=>{GROUPS[g].matches.forEach(m=>{all.push({...m,group:g});});});
    const dateOrder=['Thu, Jun 11','Fri, Jun 12','Sat, Jun 13','Sun, Jun 14','Mon, Jun 15','Tue, Jun 16','Wed, Jun 17','Thu, Jun 18','Fri, Jun 19','Sat, Jun 20','Sun, Jun 21','Mon, Jun 22','Tue, Jun 23','Wed, Jun 24','Thu, Jun 25','Fri, Jun 26','Sat, Jun 27'];
    const byDate={};
    all.forEach(m=>{if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});
    dateOrder.forEach(d=>{
      if(!byDate[d])return;
      const sorted=byDate[d].sort((a,b)=>(TIME_SORT[a.time]||99)-(TIME_SORT[b.time]||99));
      html+=`<div class="schedule-section"><div class="date-label">${d}</div>`;
      sorted.forEach(m=>{html+=matchBlock(m);});
      html+=`</div>`;
    });
  } else if(scheduleMode==='knockout'){
    const koDateOrder = ['Sun, Jun 28','Mon, Jun 29','Tue, Jun 30','Wed, Jul 1','Thu, Jul 2','Fri, Jul 3'];
    const byDate = {};
    R32_SCHEDULE.forEach(m=>{ if(!byDate[m.date]) byDate[m.date]=[]; byDate[m.date].push(m); });
    koDateOrder.forEach(date=>{
      if(!byDate[date]) return;
      html+=`<div class="date-label" style="margin:${html?'14px':'0'} 0 8px">${date}</div>`;
      byDate[date].sort((a,b)=>a.match-b.match).forEach(m=>{
        html+=`<div class="ko-card">
          <div class="ko-team home">${m.home}</div>
          <div class="ko-center">
            <div class="ko-vs">vs</div>
            <div class="ko-meta">${m.time} <span class="ko-badge">${m.tv}</span></div>
          </div>
          <div class="ko-team away">${m.away}</div>
        </div>`;
      });
    });
  }
  document.getElementById('schedule-content').innerHTML=html;
}

function buildPicksPanel(m, res) {
  const homeCode = Object.keys(KO_TEAMS).find(k => KO_TEAMS[k] === m.home);
  const awayCode = Object.keys(KO_TEAMS).find(k => KO_TEAMS[k] === m.away);
  const homePickers = [], awayPickers = [];
  Object.keys(KO_PICKS).forEach(player => {
    const code = KO_PICKS[player][m.num];
    if (!code) return;
    if (code === homeCode) homePickers.push(player);
    else if (code === awayCode) awayPickers.push(player);
  });
  const homeWon = res === 'home', awayWon = res === 'away';
  const row = (name, won, lost) => {
    const cls = won ? 'br-correct' : lost ? 'br-wrong' : '';
    const pre = won ? '✓ ' : lost ? '✗ ' : '';
    return `<div class="br-pick-name ${cls}">${pre}${name}</div>`;
  };
  const hCls = homeWon ? 'br-winning' : awayWon ? 'br-losing' : '';
  const aCls = awayWon ? 'br-winning' : homeWon ? 'br-losing' : '';
  return `<div class="br-picks-cols">
    <div>
      <div class="br-picks-col-team ${hCls}">${m.home}</div>
      ${homePickers.length ? homePickers.map(n=>row(n,homeWon,awayWon)).join('') : '<div class="br-pick-name" style="color:var(--muted);font-style:italic">—</div>'}
    </div>
    <div>
      <div class="br-picks-col-team ${aCls}">${m.away}</div>
      ${awayPickers.length ? awayPickers.map(n=>row(n,awayWon,homeWon)).join('') : '<div class="br-pick-name" style="color:var(--muted);font-style:italic">—</div>'}
    </div>
  </div>`;
}

function buildR16PicksPanel(m, res) {
  // For R16, picks are stored by match number
  const homePickers = [], awayPickers = [];
  Object.keys(KO_PICKS).forEach(player => {
    const code = KO_PICKS[player][m.num];
    if (!code) return;
    const pickName = KO_TEAMS[code] || code;
    // Check if pick matches confirmed home or away team
    if (m.homeConfirmed && code === m.homeConfirmed) homePickers.push(player);
    else if (m.awayConfirmed && code === m.awayConfirmed) awayPickers.push(player);
    else {
      // Match by team name in the home/away string
      if (m.home.includes(pickName.replace(/^[^\s]+\s/,''))) homePickers.push(player);
      else awayPickers.push(player);
    }
  });
  const homeWon = res === 'home', awayWon = res === 'away';
  const row = (name, won, lost) => {
    const cls = won ? 'br-correct' : lost ? 'br-wrong' : '';
    const pre = won ? '✓ ' : lost ? '✗ ' : '';
    return `<div class="br-pick-name ${cls}">${pre}${name}</div>`;
  };
  const hCls = homeWon ? 'br-winning' : awayWon ? 'br-losing' : '';
  const aCls = awayWon ? 'br-winning' : homeWon ? 'br-losing' : '';
  const homeName = m.homeConfirmed ? (KO_TEAMS[m.homeConfirmed]||m.home) : m.home;
  const awayName = m.awayConfirmed ? (KO_TEAMS[m.awayConfirmed]||m.away) : m.away;
  return `<div class="br-picks-cols">
    <div>
      <div class="br-picks-col-team ${hCls}">${homeName}</div>
      ${homePickers.length ? homePickers.map(n=>row(n,homeWon,awayWon)).join('') : '<div class="br-pick-name" style="color:var(--muted);font-style:italic">—</div>'}
    </div>
    <div>
      <div class="br-picks-col-team ${aCls}">${awayName}</div>
      ${awayPickers.length ? awayPickers.map(n=>row(n,awayWon,homeWon)).join('') : '<div class="br-pick-name" style="color:var(--muted);font-style:italic">—</div>'}
    </div>
  </div>`;
}

function setBrRound(idx,el){
  brRound=idx;
  document.getElementById('br-swipe-wrapper').style.transform=`translateX(-${idx*20}%)`;
  document.querySelectorAll('.br-round-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.br-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

function brToggle(id){
  const panel=document.getElementById('brpanel-'+id);
  const icon=document.getElementById('bricon-'+id);
  const open=panel.classList.contains('open');
  panel.classList.toggle('open',!open);
  if(icon)icon.textContent=open?'▾':'▴';
}

    <div class="score-card"><div class="score-card-label">Total</div><div class="score-card-val">${tot}</div></div>
    <div class="score-card"><div class="score-card-label">Rank</div><div class="score-card-val">${rank} of ${PLAYERS.length}</div></div>
    <div class="score-card"><div class="score-card-label">Group + Bonus + 3rd</div><div class="score-card-val">${gp+bp+calcThirdPts(p1)}</div></div>
    <div class="score-card"><div class="score-card-label">KO pts</div><div class="score-card-val">${calcKOPts(p1)||'—'}</div></div>
  </div>`;

  // Max Possible Final Score breakdown — solo view only
  if(!isCompare){
    let groupMaxTotal=0, bonusMaxTotal=0;
    Object.keys(GROUPS).forEach(g=>{
      groupMaxTotal += maxGroupPts(p1.picks[g], GROUPS[g].result, g);
      bonusMaxTotal += maxBonusPts(p1.picks[g], GROUPS[g].result);
    });
    const thirdMaxTotal = maxThirdPts(p1);
    const koMaxTotal = calcKOMaxPts(p1);
    const grandMax = groupMaxTotal + bonusMaxTotal + thirdMaxTotal + koMaxTotal;
    html+=`<div class="analytic-card" style="margin-bottom:16px;border-color:var(--accent2)">
      <div class="analytic-title">Max Possible Final Score</div>
      <div class="analytic-row"><span>Group picks</span><span class="analytic-val good">${groupMaxTotal}</span></div>
      <div class="analytic-row"><span>Perfect group bonuses</span><span class="analytic-val good">${bonusMaxTotal}</span></div>
      <div class="analytic-row"><span>3rd place picks</span><span class="analytic-val good">${thirdMaxTotal}</span></div>
      <div class="analytic-row"><span>Knockout stage</span><span class="analytic-val good">${koMaxTotal}</span></div>
      <div class="analytic-row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:8px"><span style="font-weight:600">Maximum Final Score</span><span class="analytic-val neutral" style="font-size:18px">${grandMax}</span></div>
    </div>`;
  }

  // Knockout Picks — solo view only, if player has bracket picks entered
  if(!isCompare && KO_PICKS[p1.name]){
    const picks = KO_PICKS[p1.name];
    const allMatches = [];
    [...BR_PAIRS, ...R16_PAIRS].forEach(pair=>pair.matches.forEach(m=>allMatches.push(m)));
    // Group by round
    const roundLabels = {73:'Round of 32',89:'Round of 16',97:'Quarterfinals',101:'Semifinals',103:'3rd Place Playoff',104:'Final'};
    const roundPts = {73:10,89:20,97:50,101:100,103:50,104:250};
    let currentRoundStart = null;
    html+=`<div class="sec-label" style="margin-bottom:8px">Knockout Picks</div>`;
    Object.keys(picks).map(Number).sort((a,b)=>a-b).forEach(mNum=>{
      if(roundLabels[mNum]!==undefined){
        if(currentRoundStart!==null) html+=`</div>`;
        html+=`<div class="analytic-card" style="margin-bottom:10px"><div class="analytic-title">${roundLabels[mNum]} · ${roundPts[mNum]}pts each</div>`;
        currentRoundStart=mNum;
      }
      const code = picks[mNum];
      const teamName = KO_TEAMS[code] || code;
      const match = allMatches.find(m=>m.num===mNum);
      let state='open', resultLabel='Pending';
      if(isTeamEliminated(code)){
        state='miss'; resultLabel='Eliminated';
      } else if(match){
        const homeCode = match.homeConfirmed || Object.keys(KO_TEAMS).find(k=>KO_TEAMS[k]===match.home);
        const awayCode = match.awayConfirmed || Object.keys(KO_TEAMS).find(k=>KO_TEAMS[k]===match.away);
        const pickSide = code===homeCode?'home':code===awayCode?'away':null;
        if(match.result && pickSide){
          state = pickSide===match.result ? 'hit' : 'miss';
          resultLabel = match.score || (match.result==='home'?match.home:match.away);
        } else if(match.result){
          state='miss'; resultLabel = match.score || '';
        }
      }
      const cls = state==='hit'?'bd-hit':state==='miss'?'bd-miss':'bd-open';
      const pts = KO_PTS_BY_ROUND[mNum] || roundPts[currentRoundStart] || 10;
      let ptsDisplay;
      if(state==='hit') ptsDisplay = `<span class="bd-icon bd-icon-hit">✓</span> ${pts}`;
      else if(state==='miss') ptsDisplay = `<span class="bd-icon bd-icon-miss">✗</span> ${pts}`;
      else ptsDisplay = `${pts}`;
      html+=`<div class="bd-row ${cls}"><span class="bd-label">M${mNum} · ${teamName}</span><span class="bd-pts">${ptsDisplay}</span></div>`;
    });
    if(currentRoundStart!==null) html+=`</div>`;
  }

  // 3rd Place Pick Breakdown — solo view only
  if(!isCompare && p1.thirds && p1.thirds.length){
    html+=`<div class="sec-label" style="margin-bottom:8px">3rd Place Advancing Picks</div>
    <div class="analytic-card" style="margin-bottom:16px">`;
    p1.thirds.forEach(teamName=>{
      const state = thirdPickState(teamName);
      const cls = state==='hit'?'bd-hit':state==='miss'?'bd-miss':'bd-open';
      let ptsDisplay;
      if(state==='hit'){
        ptsDisplay = `<span class="bd-icon bd-icon-hit">✓</span> 3`;
      } else if(state==='miss'){
        ptsDisplay = `<span class="bd-icon bd-icon-miss">✗</span> 3`;
      } else {
        ptsDisplay = `3`;
      }
      html+=`<div class="bd-row ${cls}"><span class="bd-label">${teamName}</span><span class="bd-pts">${ptsDisplay}</span></div>`;
    });
    html+=`</div>`;
  }

  if(isCompare){
    // Overall summary card
    const title=comparePlayers.map(p=>p.name.split(' ')[0]).join(' vs ');
    html+=`<div class="sec-label" style="margin-bottom:10px">${title}</div>
    <div class="analytic-card" style="margin-bottom:12px"><div class="analytic-title">Overall</div>`;
    comparePlayers.forEach(p=>{
      const r=sorted.findIndex(pl=>pl.name===p.name)+1;
      html+=`<div class="analytic-row"><span>${p.name}</span><span class="analytic-val neutral">${totalPts(p)} pts — #${r}</span></div>`;
    });
    html+=`</div>`;

    // Group cards
    Object.keys(GROUPS).forEach(g=>{
      const grp=GROUPS[g],hasAnyResult=!!grp.result;
      const ptsLine=comparePlayers.map(p=>{
        const pts=hasAnyResult?calcGroupPts(p.picks[g],grp.result,g)+calcBonusPts(p.picks[g],grp.result):null;
        return `<span style="color:var(--${p===p1?'accent':'muted'})">${p.name.split(' ')[0]}: ${hasAnyResult?pts+'pts':'—'}</span>`;
      }).join('');
      html+=`<div class="compare-group">
        <div class="compare-group-hdr">
          <span class="compare-group-letter">Group ${g}</span>
          <div class="compare-pts" style="flex-wrap:wrap;gap:6px">${ptsLine}</div>
        </div>
        <div class="player-group-split">
          <div class="player-group-col">
            <div class="player-group-col-label">Current Standings</div>
            <table class="mini-standings"><thead><tr><th></th><th>Pts</th><th>GF</th><th>GA</th><th>GD</th></tr></thead><tbody>`;
      grp.table.forEach(row=>{
        html+=`<tr><td class="mini-team">${teamName(row.team)}</td><td>${row.pts}</td><td>${row.gf||0}</td><td>${row.ga||0}</td><td>${row.gd>0?'+'+row.gd:row.gd}</td></tr>`;
      });
      html+=`</tbody></table>
          </div>
          <div class="player-group-col">
            <div class="player-group-col-label" style="display:flex;gap:8px;justify-content:flex-end">
              ${comparePlayers.map(p=>`<span style="min-width:22px;text-align:center;font-size:9px;color:var(--muted)">${p.name.split(' ')[0]}</span>`).join('')}
            </div>`;
      grp.table.forEach(row=>{
        const teamIdx=grp.teams.indexOf(row.team);
        const actual=hasAnyResult?grp.result[teamIdx]:null;
        html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:11px;color:var(--text)">${teamName(row.team)}</span>
          <div style="display:flex;gap:4px">`;
        const tname=countryName(row.team);
        comparePlayers.forEach(p=>{
          const pick=p.picks[g][teamIdx];
          html+=`<div class="badge ${badgeClass(pick,actual,tname)}" style="width:22px;height:22px;font-size:10px">${pick}</div>`;
        });
        html+=`</div></div>`;
      });
      html+=`</div>
        </div>
      </div>`;
    });
  } else {
    html+=`<div class="sec-label" style="margin-bottom:8px">Group picks</div><div class="player-groups">`;
    Object.keys(GROUPS).forEach(g=>{
      const grp=GROUPS[g],hasAnyResult=!!grp.result;
      const pts=hasAnyResult?calcGroupPts(p1.picks[g],grp.result,g)+calcBonusPts(p1.picks[g],grp.result):null;
      html+=`<div class="player-group-card"><div class="player-group-top">
        <span class="player-group-letter">Group ${g}</span>
        <span class="player-group-pts${hasAnyResult?' scored':''}">${hasAnyResult?pts+' pts':'Pending'}</span>
      </div>
      <div class="player-group-split">
        <div class="player-group-col">
          <div class="player-group-col-label">${p1.name}'s Picks</div>
          <div class="player-picks-list">`;
      // Sort by pick position: 1st pick first, 4th last
      const sortedPicks=[...p1.picks[g].map((pick,i)=>({pick,i}))].sort((a,b)=>a.pick-b.pick);
      sortedPicks.forEach(({pick,i})=>{
        const actual=hasAnyResult?grp.result[i]:null;
        const tname=countryName(grp.teams[i]);
        html+=`<div class="player-pick"><div class="badge ${badgeClass(pick,actual,tname)}">${pick}</div>${teamName(grp.teams[i])}</div>`;
      });
      html+=`</div>
        </div>
        <div class="player-group-col">
          <div class="player-group-col-label">Current Standings</div>
          <table class="mini-standings"><thead><tr><th></th><th>Pts</th><th>GF</th><th>GA</th><th>GD</th></tr></thead><tbody>`;
      grp.table.forEach(row=>{
        html+=`<tr><td class="mini-team">${teamName(row.team)}</td><td>${row.pts}</td><td>${row.gf}</td><td>${row.ga}</td><td>${row.gd>0?'+'+row.gd:row.gd}</td></tr>`;
      });
      html+=`</tbody></table>
        </div>
      </div>
      <div class="point-breakdown">
        <div class="player-group-col-label" style="margin-top:10px">Point Breakdown</div>`;

      // Build breakdown rows for this group/player — ALWAYS show all 6 possible point sources
      {
        const picks=p1.picks[g];
        const result=grp.result; // array of 4, each null (open) or 1-4 (confirmed position), or null entirely (group untouched)
        const p1pickPos=picks.indexOf(1), p2pickPos=picks.indexOf(2);
        const pick1Team=countryName(grp.teams[p1pickPos]);
        const pick2Team=countryName(grp.teams[p2pickPos]);
        const a1=result?result.indexOf(1):-1; // confirmed 1st index, -1 if not locked
        const a2=result?result.indexOf(2):-1; // confirmed 2nd index, -1 if not locked

        const rowState = (targetPos, checkIdx, requiredFinish) => {
          // targetPos: the confirmed-position index we need (a1 or a2), -1 if not locked
          // checkIdx: the pick's team index we're testing against that position
          // requiredFinish: the finishing position (1 or 2) this row requires checkIdx's team to have
          // If the team at checkIdx already has a DIFFERENT confirmed finish, it's an automatic miss
          if(result){
            const actualFinishOfCheckTeam = result[checkIdx];
            if(actualFinishOfCheckTeam!==null && actualFinishOfCheckTeam!==undefined && actualFinishOfCheckTeam!==requiredFinish){
              return 'miss'; // this team is already confirmed at a different spot
            }
          }
          if(targetPos===-1) return 'open';
          return checkIdx===targetPos ? 'hit' : 'miss';
        };

        const rows=[];
        // 1) 1st pick finishes 1st (10)
        rows.push({label:`${pick1Team} finishes 1st`, pts:10, state: rowState(a1,p1pickPos,1)});
        // 2) 1st pick finishes 2nd (5)
        rows.push({label:`${pick1Team} finishes 2nd`, pts:5, state: rowState(a2,p1pickPos,2)});
        // 3) 2nd pick finishes 2nd (5)
        rows.push({label:`${pick2Team} finishes 2nd`, pts:5, state: rowState(a2,p2pickPos,2)});
        // 4) 2nd pick finishes 1st (5)
        rows.push({label:`${pick2Team} finishes 1st`, pts:5, state: rowState(a1,p2pickPos,1)});
        // 5) 2nd pick finishes 3rd & advances (2)
        {
          const finishPosOf2ndPick = result?result[p2pickPos]:null;
          let state;
          if(finishPosOf2ndPick===3){
            state = ADVANCING_3RD.includes(pick2Team) ? 'hit' : (ADVANCING_3RD.length ? 'miss' : 'open');
          } else if(finishPosOf2ndPick===null || finishPosOf2ndPick===undefined){
            state = 'open';
          } else {
            state = 'miss'; // confirmed at a position other than 3rd
          }
          rows.push({label:`${pick2Team} 3rd & advances`, pts:2, state});
        }
        // 6) Perfect group bonus (5)
        {
          let state='open';
          if(result){
            let contradicted=false;
            for(let i=0;i<4;i++){ if(result[i]!==null && result[i]!==picks[i]){ contradicted=true; break; } }
            if(contradicted) state='miss';
            else if(result.every((v,i)=>v===picks[i])) state='hit';
          }
          rows.push({label:'Perfect group (1-2-3-4)', pts:5, state});
        }

        rows.forEach(r=>{
          const cls = r.state==='hit'?'bd-hit':r.state==='miss'?'bd-miss':'bd-open';
          let ptsDisplay;
          if(r.state==='hit'){
            ptsDisplay = `<span class="bd-icon bd-icon-hit">✓</span> ${r.pts}`;
          } else if(r.state==='miss'){
            ptsDisplay = `<span class="bd-icon bd-icon-miss">✗</span> ${r.pts}`;
          } else {
            ptsDisplay = `${r.pts}`;
          }
          html+=`<div class="bd-row ${cls}"><span class="bd-label">${r.label}</span><span class="bd-pts">${ptsDisplay}</span></div>`;
        });
      }

      html+=`</div></div>`;
    });
    html+=`</div>`;

    const doneGroups=Object.keys(GROUPS).filter(g=>GROUPS[g].result);
    const scoredG=doneGroups.map(g=>({g,pts:calcGroupPts(p1.picks[g],GROUPS[g].result,g)+calcBonusPts(p1.picks[g],GROUPS[g].result)})).sort((a,b)=>b.pts-a.pts);
    const contrarian=[];
    doneGroups.forEach(g=>{
      GROUPS[g].teams.forEach((team,i)=>{
        const pick=p1.picks[g][i],agree=PLAYERS.filter(p=>p.picks[g][i]===pick).length;
        if(agree/PLAYERS.length<0.35)contrarian.push({g,team,pick,actual:GROUPS[g].result[i],pct:Math.round(agree/PLAYERS.length*100)});
      });
    });

    html+=`<div class="sec-label" style="margin-bottom:8px">Analytics</div>`;
    if(scoredG.length){
      html+=`<div class="analytic-card"><div class="analytic-title">Best & worst groups</div>`;
      scoredG.slice(0,3).forEach(({g,pts})=>{html+=`<div class="analytic-row"><span>Group ${g}</span><span class="analytic-val good">+${pts}</span></div>`;});
      if(scoredG.length>3)scoredG.slice(-2).forEach(({g,pts})=>{html+=`<div class="analytic-row"><span>Group ${g}</span><span class="analytic-val bad">${pts}</span></div>`;});
      html+=`</div>`;
    }
    if(contrarian.length){
      html+=`<div class="analytic-card"><div class="analytic-title">Contrarian picks</div>`;
      contrarian.slice(0,4).forEach(c=>{
        const hit=c.pick===c.actual;
        html+=`<div class="analytic-row"><span>${countryName(c.team)} — picked ${c.pick} (${c.pct}% agreed)</span><span class="analytic-val ${hit?'good':'bad'}">${hit?'✓ Hit':'✗ Miss'}</span></div>`;
      });
      html+=`</div>`;
    }
    html+=`<div class="analytic-card"><div class="analytic-title">vs. the field</div>
      <div class="analytic-row"><span>Your score</span><span class="analytic-val neutral">${tot}</span></div>
      <div class="analytic-row"><span>Pool average</span><span class="analytic-val neutral">${avgPts}</span></div>
      <div class="analytic-row"><span>Leader</span><span class="analytic-val neutral">${leader}</span></div>
      <div class="analytic-row"><span>Gap to 1st</span><span class="analytic-val ${tot>=leader?'good':'bad'}">${tot>=leader?'You lead':(leader-tot)+' pts back'}</span></div>
    </div>`;
  }
  document.getElementById('player-detail').innerHTML=html;
}

function goPlayer(name){
  showTab('pv',document.querySelectorAll('.tab')[3]);
  setTimeout(()=>{const sel=document.getElementById('p1-sel');if(sel){sel.value=name;renderPlayerDetail();}},50);
}

function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(el&&el.classList)el.classList.add('active');
}

      <div class="rules-row"><span class="rules-row-label">Winner</span><span class="rules-row-val">250 pts</span></div>
      <div class="rules-note">The full knockout bracket must be filled out before the knockout stage begins.</div>
    </div>
  `;
  document.getElementById('rl').innerHTML=html;
}
